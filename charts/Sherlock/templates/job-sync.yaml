apiVersion: batch/v1
kind: Job
metadata:
  name: sherlocks-sync
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: deck-sync
          image: kong/deck:latest
          args:
            - "sync"
            - "--state"
            - "/state/{{ .Values.stateFileName }}"
            - "--kong-addr"
            - "{{ .Values.kongAdminURL }}"
            {{- $mode := default "full" .Values.deck.mode }}
            {{- if eq $mode "routes-only" }}
            # Routes/services-only mode: do NOT touch consumers or other entities
            - "--skip-consumers"
            - "--skip-upstreams"
            - "--skip-certificates"
            - "--skip-ca-certificates"
            - "--skip-snis"
            - "--skip-vaults"
            - "--skip-keys"
            - "--skip-kv"
            {{- end }}
          env:
{{- if .Values.rbac.enabled }}
            - name: KONG_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kong-admin-token
                  key: token
{{- end }}
          volumeMounts:
            - name: state
              mountPath: /state
      volumes:
        - name: state
          configMap:
            name: sherlock-state

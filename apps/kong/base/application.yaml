apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: kong
  namespace: kong
spec:
  chart: kong
  repo: https://charts.konghq.com
  targetNamespace: kong
  valuesContent: |-
    # === Enterprise image ===
    image:
      repository: us-central1-docker.pkg.dev/sherlock-004/ts43/custom-log-plugin
      tag: v1.0.4
      pullPolicy: IfNotPresent
    # === Enable Enterprise & supply license in license.json ===
    enterprise:
      enabled: true
      license_secret: kong-enterprise-license

    env:
      proxy_access_log: "/dev/null"
      KONG_LOG_LEVEL: notice
      plugins: "bundled,custom-log-plugin"

      LUA_PACKAGE_PATH: "/usr/local/?.lua;;"
      # Database configuration
      database: "postgres"
      pg_host: "postgres-kong.kong.svc.cluster.local"
      pg_port: 5432
      pg_user: "kong"
      pg_password: "supersecret-kong"
      pg_database: "kong"

      # Admin credentials
      password: "SetA-Strong-Admin-Password"

      # Enable Admin API + Manager
      admin_listen: "0.0.0.0:8001, 0.0.0.0:8444 ssl"
      admin_gui_listen: "0.0.0.0:8002, 0.0.0.0:8445 ssl"
      admin_gui_url: "http://23.236.58.69:30516"
      admin_gui_api_url: "http://23.236.58.69:32081"

    proxy:
      type: NodePort
      http:
        enabled: true
        servicePort: 80
        nodePort: 32080
      tls:
        enabled: true
        servicePort: 443
        nodePort: 32443
      externalTrafficPolicy: Local
   
    admin:
      enabled: true
      type: NodePort
      http:
        enabled: true
        servicePort: 8001
        nodePort: 32081
      tls:
        enabled: true
        servicePort: 8444
        nodePort: 32441

    manager:
      enabled: true
      type: NodePort
      http:
        enabled: true
        servicePort: 8002
        nodePort: 30516
      tls:
        enabled: true 
        servicePort: 8445
        nodePort: 30952

    status:
      enabled: true

    migrations:
      enabled: true
# apps/kong/on-perm/deployment-patch.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong-kong
  namespace: kong
spec:
  template:
    spec:
      containers:
        - name: proxy
          env:
            # === Other Settings You Needed ===
            - name: KONG_TRUSTED_IPS
              value: "0.0.0.0/0,::/0"
            - name: KONG_REAL_IP_HEADER
              value: "X-Forwarded-For"
            - name: KONG_REAL_IP_RECURSIVE
              value: "on"
            - name: KONG_UNTRUSTED_LUA_SANDBOX_REQUIRES
              value: "kong.http.client"

            # === Log File Settings ===
            - name: KONG_PROXY_ACCESS_LOG
              value: "/tmp/kong_requests.log"
            - name: KONG_ADMIN_ACCESS_LOG
              value: "off"
            - name: KONG_ERROR_LOG
              value: "/tmp/kong_error.log"
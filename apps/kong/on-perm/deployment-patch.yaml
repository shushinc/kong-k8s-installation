apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong-kong
  namespace: kong
spec:
  template:
    spec:
      containers:
        - name: proxy
          env:
            - name: KONG_TRUSTED_IPS
              value: "0.0.0.0/0,::/0"
            - name: KONG_REAL_IP_HEADER
              value: "X-Forwarded-For"
            - name: KONG_REAL_IP_RECURSIVE
              value: "on"
            - name: KONG_UNTRUSTED_LUA_SANDBOX_REQUIRES
              value: "kong.http.client"
            - name: KONG_PLUGINS
              value: "bundled,custom-log-plugin"
            - name: KONG_LUA_PACKAGE_PATH
              value: "/opt/kong/plugins/?.lua;;"
          volumeMounts:
            - name: kong-custom-plugins-volume
              mountPath: /opt/kong/plugins/custom-log-plugin
      volumes:
        - name: kong-custom-plugins-volume
          configMap:
            name: kong-custom-plugins
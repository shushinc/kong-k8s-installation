# --- Service Account for GCP Authentication ---
# This service account will be linked to your GCP service account.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aggregator-sa
  namespace: default # Make sure this is the same namespace as the aggregator
  annotations:
    iam.gke.io/gcp-service-account: YOUR_GCP_SERVICE_ACCOUNT@YOUR_PROJECT_ID.iam.gserviceaccount.com

---
# --- ConfigMap for Pricing Data ---
# This loads your pricing.csv file into the cluster so the app can use it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: pricing-config
  namespace: default
data:
  pricing.csv: |
    # Paste the content of your pricing.csv file here
    # Example:
    Endpoint,Price,API
    camara,0.01,CAMARA-API
    oauth2,0.0,Internal-API
    number-verification,0.02,Number-Verify-API

---
# --- Aggregator Deployment ---
# This runs your containerized Python application.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aggregator
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aggregator
  template:
    metadata:
      labels:
        app: aggregator
    spec:
      serviceAccountName: aggregator-sa
      containers:
      - name: aggregator
        # IMPORTANT: Replace this with the path to your container image
        image: gcr.io/YOUR_PROJECT_ID/aggregator:v1
        ports:
        - containerPort: 8080
        env:
        - name: SERVICE_ACCOUNT_FILE
          value: "/gcp/key.json"
        - name: PRICING_FILE_PATH
          value: "/config/pricing.csv"
        # Mount the GCP key and pricing config file into the container
        volumeMounts:
        - name: gcp-key-volume
          mountPath: "/gcp"
          readOnly: true
        - name: pricing-volume
          mountPath: "/config"
          readOnly: true
      volumes:
      - name: gcp-key-volume
        secret:
          secretName: gcp-sa-key # This secret will hold your JSON key
      - name: pricing-volume
        configMap:
          name: pricing-config

---
# --- Aggregator Service (The Log Sink) ---
# This creates the stable network endpoint 'log-sink.default.svc.cluster.local'.
apiVersion: v1
kind: Service
metadata:
  name: log-sink # This name MUST match the Host in your Fluent Bit config
  namespace: default
spec:
  selector:
    app: aggregator
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080

---
# --- Hourly CronJob ---
# This calls the /trigger_aggregation endpoint every hour.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: bq-aggregator-trigger
  namespace: default
spec:
  schedule: "0 * * * *" # Runs at the start of every hour
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: trigger-curl
            image: curlimages/curl:7.82.0
            args:
            - "-X"
            - "POST"
            - "http://log-sink.default.svc.cluster.local:8080/trigger_aggregation"
          restartPolicy: OnFailure

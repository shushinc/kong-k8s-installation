apiVersion: apps/v1
kind: Deployment
metadata:
  name: ts43-eke-aaa-cookie
  namespace: kong
  labels:
    app: ts43-eke-aaa-cookie
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ts43-eke-aaa-cookie
  template:
    metadata:
      labels:
        app: ts43-eke-aaa-cookie
    spec:
      containers:
        - name: ts43-eke-aaa-cookie
          image: us-central1-docker.pkg.dev/sherlock-004/ts43/ts43-eke-aaa-cookie:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      terminationGracePeriodSeconds: 10

